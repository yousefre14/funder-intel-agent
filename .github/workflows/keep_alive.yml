name: Keep Alive

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake app
        run: |
          curl -L --max-redirs 5 \
          -A "Mozilla/5.0" \
          https://funder-intel-agent.streamlit.app
